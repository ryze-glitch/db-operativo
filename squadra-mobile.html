<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Squadra Mobile</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #07090f;
            --bg-panel: #10141f;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #2563eb; 
            --accent-hover: #1d4ed8;
            --border-color: rgba(255, 255, 255, 0.08);
            --sidebar-width: 320px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Lexend', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        a { text-decoration: none; color: inherit; }

        /* --- SIDEBAR LATERALE (Stile .split-left) --- */
        .dashboard-sidebar {
            width: var(--sidebar-width);
            position: relative;
            background-image: url('https://i.imgur.com/HYyxG9W.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }
        
        .dashboard-sidebar::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(7, 9, 15, 0.95) 0%, rgba(37, 99, 235, 0.25) 100%);
            z-index: 0;
        }

        .sidebar-content {
            position: relative; z-index: 1; display: flex; flex-direction: column;
            height: 100%; padding: 40px 30px;
        }

        .dept-header { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; }
        .dept-header img { width: 45px; height: 45px; object-fit: contain; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .dept-header h2 { font-size: 1.2rem; font-weight: 700; color: var(--text-main); line-height: 1.2; }
        .dept-header span { font-size: 0.8rem; color: var(--accent-blue); text-transform: uppercase; letter-spacing: 1px; }

        .user-profile-box {
            background: rgba(15, 17, 26, 0.6); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 15px;
            margin-bottom: 40px; backdrop-filter: blur(10px);
        }
        .user-avatar { width: 50px; height: 50px; background: rgba(37, 99, 235, 0.2); border: 2px solid var(--accent-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--accent-blue); }
        .user-details h3 { font-size: 1rem; margin-bottom: 4px; }
        .user-details .matricola { font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 5px; }
        .status-online { display: inline-flex; align-items: center; gap: 6px; font-size: 0.75rem; color: #10b981; background: rgba(16, 185, 129, 0.1); padding: 3px 8px; border-radius: 999px; }
        .dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; box-shadow: 0 0 5px #10b981; }

        .sidebar-nav { display: flex; flex-direction: column; gap: 10px; flex: 1; }
        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 12px;
            color: var(--text-muted); font-size: 0.95rem; font-weight: 500; transition: all 0.3s;
            border: 1px solid transparent;
        }
        .nav-item i { font-size: 1.1rem; width: 24px; text-align: center; }
        .nav-item:hover, .nav-item.active { background: rgba(37, 99, 235, 0.15); color: var(--text-main); border-color: rgba(37, 99, 235, 0.3); }
        .nav-item.active i { color: var(--accent-blue); }

        .btn-logout {
            width: 100%; padding: 15px; background: rgba(239, 68, 68, 0.1); color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 12px; font-weight: 600; font-size: 0.95rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s;
        }
        .btn-logout:hover { background: #ef4444; color: white; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); }

        /* --- AREA PRINCIPALE (Stile .split-right e .modern-card) --- */
        .dashboard-main { flex: 1; background: var(--bg-panel); padding: 50px; overflow-y: auto; }

        .main-header { margin-bottom: 40px; border-bottom: 1px solid var(--border-color); padding-bottom: 30px; }
        .main-header h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 8px; }
        .main-header p { color: var(--text-muted); font-size: 1.05rem; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        
        /* Stesse card del tuo file CSS */
        .modern-card { background: #161b26; border: 1px solid var(--border-color); border-radius: 16px; padding: 25px; display: flex; align-items: center; cursor: pointer; transition: all 0.3s ease; text-align: left; width: 100%; color: var(--text-main); }
        .modern-card:hover { background: #1e2433; border-color: var(--accent-blue); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card-icon-wrapper { background: rgba(37, 99, 235, 0.1); border: 1px solid rgba(37, 99, 235, 0.2); min-width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 20px; font-size: 1.5rem; color: var(--accent-blue); }
        .card-content h3 { font-size: 1.15rem; margin-bottom: 5px; font-weight: 600; }
        .card-content p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }

    </style>
</head>
<body>

    <aside class="dashboard-sidebar">
        <div class="sidebar-content">
            
            <div class="dept-header">
                <img id="logo-reparto" src="https://i.imgur.com/J3T1Kot.png" alt="Reparto">
                <div>
                    <h2 id="titolo-reparto">Caricamento...</h2>
                    <span>Terminale Centrale</span>
                </div>
            </div>

            <div class="user-profile-box">
                <div class="user-avatar"><i class="fas fa-user-shield"></i></div>
                <div class="user-details">
                    <h3 id="display-nome">Agente Sconosciuto</h3>
                    <span class="matricola" id="display-matricola">Matricola: ---</span>
                    <span class="status-online"><div class="dot"></div> Rete Sicura</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item active"><i class="fas fa-desktop"></i> Plancia Operativa</a>
                <a href="#" class="nav-item"><i class="fas fa-address-card"></i> Schedati & Profili</a>
                <a href="#" class="nav-item"><i class="fas fa-file-contract"></i> Rapporti Indagine</a>
                <a href="#" class="nav-item"><i class="fas fa-gavel"></i> Mandati Arresto</a>
            </nav>

            <button class="btn-logout" id="btn-logout">
                <span>Disconnetti</span> <i class="fas fa-power-off"></i>
            </button>

        </div>
    </aside>

    <main class="dashboard-main">
        <header class="main-header">
            <h1 id="saluto-welcome">Caricamento in corso...</h1>
            <p>Seleziona un modulo operativo dalla griglia sottostante per procedere.</p>
        </header>

        <div class="cards-grid">
            
            <button class="modern-card">
                <div class="card-icon-wrapper"><i class="fas fa-search"></i></div>
                <div class="card-content">
                    <h3>Ricerca Globale</h3>
                    <p>Interroga il database centrale per targhe, nomi o documenti.</p>
                </div>
            </button>

            <button class="modern-card">
                <div class="card-icon-wrapper"><i class="fas fa-folder-plus"></i></div>
                <div class="card-content">
                    <h3>Nuovo Rapporto</h3>
                    <p>Compila un resoconto formale per l'ultima operazione effettuata.</p>
                </div>
            </button>

            <button class="modern-card">
                <div class="card-icon-wrapper" style="color: #ef4444; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2);"><i class="fas fa-exclamation-triangle"></i></div>
                <div class="card-content">
                    <h3 style="color: #ef4444;">Soggetti Ricercati</h3>
                    <p>Visualizza la lista aggiornata dei mandati di cattura attivi.</p>
                </div>
            </button>

            <button class="modern-card">
                <div class="card-icon-wrapper"><i class="fas fa-car-side"></i></div>
                <div class="card-content">
                    <h3>Registro Veicoli</h3>
                    <p>Archivio MCTC per la consultazione dei veicoli segnalati.</p>
                </div>
            </button>

        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const utenteString = localStorage.getItem('utenteLoggato');
            
            // Seleziona se l'utente non è connesso
            if (!utenteString) {
                alert("Sessione non valida o scaduta. Effettua nuovamente il login.");
                window.location.href = 'index.html'; 
                return;
            }

            const utente = JSON.parse(utenteString);

            // Popola i dati recuperati da Firebase
            document.getElementById('display-nome').innerText = `${utente.grado} ${utente.nome}`;
            document.getElementById('display-matricola').innerText = `Matricola: ${utente.matricola}`;
            document.getElementById('saluto-welcome').innerText = `Benvenuto, ${utente.nome}`;
            
            // Imposta reparto e logo in base alla scelta nel login
            if(utente.reparto) {
                document.getElementById('titolo-reparto').innerText = utente.reparto;
                const logoEl = document.getElementById('logo-reparto');
                if(utente.reparto === 'Squadra Mobile') logoEl.src = 'https://i.imgur.com/J3T1Kot.png';
                if(utente.reparto === 'DIGOS') logoEl.src = 'https://i.imgur.com/rgGjsgX.png';
                if(utente.reparto === 'NOS') logoEl.src = 'https://i.imgur.com/gy3HsSH.png';
            }

            // Funzione di Logout
            document.getElementById('btn-logout').addEventListener('click', () => {
                localStorage.removeItem('utenteLoggato');
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
