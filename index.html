<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminale Operativo - Polizia di Stato IPRP</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #090a0f;
            --nav-bg: rgba(20, 22, 28, 0.75);
            --nav-border: rgba(255, 255, 255, 0.08);
            --pill-dark: #1b1e24;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-hover: #ffffff;
            --accent-blue: #2563eb; 
            --accent-hover: #1d4ed8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Lexend', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; min-height: 100vh; }
        a { text-decoration: none; color: inherit; }

        /* --- NAVBAR ATTACCATA IN ALTO --- */
        .navbar-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
        }
        .navbar {
            background: var(--nav-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--nav-border); padding: 10px 5%;
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .nav-left { justify-self: start; }
        .nav-logo { background: var(--pill-dark); padding: 6px 20px 6px 12px; border-radius: 999px; display: flex; align-items: center; gap: 12px; font-weight: 700; color: var(--text-main); }
        .nav-logo img { height: 36px; width: auto; object-fit: contain; }
        .nav-center { justify-self: center; display: flex; align-items: center; gap: 28px; font-size: 0.95rem; font-weight: 500; color: var(--text-muted); }
        .nav-center a { display: flex; align-items: center; gap: 8px; transition: color 0.2s; }
        .nav-center a:hover { color: var(--text-hover); }
        .nav-center a i { color: var(--text-hover); opacity: 0.8; }
        .nav-right { justify-self: end; }
        .nav-login-btn { background-color: var(--accent-blue); color: white; padding: 6px 10px 6px 20px; border-radius: 999px; display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 0.95rem; border: none; cursor: pointer; transition: transform 0.2s; }
        .nav-login-btn:hover { background-color: var(--accent-hover); transform: scale(1.05); }
        .nav-login-btn .icon-circle { background-color: rgba(255, 255, 255, 0.2); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* --- DROPDOWN NAVBAR --- */
        .dropdown { position: relative; display: flex; align-items: center; height: 100%; padding: 10px 0; }
        .dropdown-menu { visibility: hidden; opacity: 0; transform: translate(-50%, 20px); position: absolute; top: 100%; left: 50%; width: 220px; background: var(--nav-bg); backdrop-filter: blur(16px); border: 1px solid var(--nav-border); border-radius: 12px; padding: 8px; display: flex; flex-direction: column; gap: 4px; transition: all 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .dropdown-menu::before { content: ''; position: absolute; top: -25px; left: 0; width: 100%; height: 25px; }
        .dropdown:hover .dropdown-menu { visibility: visible; opacity: 1; transform: translate(-50%, 5px); }
        .dropdown-menu a { padding: 10px 12px; border-radius: 8px; color: var(--text-muted); transition: background 0.2s; display: flex; align-items: center; gap: 10px; }
        .dropdown-menu a:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-hover); }

        /* --- SFONDO FOTOGRAFICO --- */
        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.imgur.com/HYyxG9W.jpg');
            background-size: cover; background-position: center;
            filter: blur(5px) brightness(0.35); z-index: 1;
        }

        /* --- PANNELLO LOGIN (VETRO) --- */
        .login-page-wrapper {
            position: relative; z-index: 2; min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 100px 20px 40px 20px;
        }

        .glass-panel {
            background: rgba(15, 17, 26, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--nav-border); border-radius: 24px;
            padding: 45px 40px; width: 100%; max-width: 440px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .panel-header { text-align: center; margin-bottom: 35px; }
        .panel-header .logo { width: 75px; margin-bottom: 15px; filter: drop-shadow(0 0 15px rgba(37, 99, 235, 0.5)); }
        .panel-header h1 { font-size: 1.5rem; font-weight: 800; color: var(--text-main); letter-spacing: 1px; margin-bottom: 5px; }
        .panel-header p { color: var(--accent-blue); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

        /* BOTTONI SELEZIONE REPARTO */
        .dept-btn {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--nav-border);
            border-radius: 16px; padding: 18px 20px; width: 100%; margin-bottom: 16px;
            color: var(--text-main); cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; text-align: left;
        }
        .dept-btn:hover { background: rgba(37, 99, 235, 0.08); border-color: var(--accent-blue); transform: translateY(-4px); }
        .dept-icon-box { background: rgba(15, 23, 42, 0.5); width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 18px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .dept-img { width: 30px; height: 30px; object-fit: contain; }
        .dept-info h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 2px; }
        .dept-info span { font-size: 0.8rem; color: var(--text-muted); }

        /* SEZIONE FORM LOGIN */
        .hidden { display: none !important; }
        .active-dept-header { text-align: center; margin-bottom: 30px; }
        .glow-icon { width: 65px; height: 65px; margin: 0 auto 15px auto; background: rgba(15, 23, 42, 0.6); border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .glow-icon img { width: 45px; height: 45px; object-fit: contain; }
        .active-dept-header h2 { font-size: 1.3rem; font-weight: 700; color: var(--text-main); text-transform: uppercase; }

        .input-group { margin-bottom: 22px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 15px; color: var(--text-muted); font-size: 1rem; }
        .input-wrapper input { width: 100%; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--nav-border); color: var(--text-main); padding: 14px 15px 14px 45px; border-radius: 12px; font-size: 1rem; transition: all 0.3s ease; }
        .input-wrapper input:focus { outline: none; border-color: var(--accent-blue); background: rgba(0, 0, 0, 0.7); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15); }

        .action-buttons { display: flex; gap: 15px; margin-top: 35px; }
        .action-buttons button { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-back { background: rgba(255, 255, 255, 0.05); color: var(--text-main); border: 1px solid var(--nav-border); }
        .btn-back:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
        .btn-submit { background: var(--accent-blue); color: white; box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3); }
        .btn-submit:hover { background: var(--accent-hover); transform: translateY(-2px); }
        
        #messaggio-errore { color: #ef4444; font-size: 0.85rem; text-align: center; margin-top: 15px; font-weight: 600; }

        @media (max-width: 1100px) { .nav-center { display: none; } }
    </style>
</head>
<body>

    <div class="navbar-wrapper">
        <nav class="navbar">
            <div class="nav-left">
                <div class="nav-logo">
                    <img src="https://i.imgur.com/SUM8B5x.png" alt="Logo">
                    POLIZIA IPRP
                </div>
            </div>
            
            <div class="nav-center">
                <a href="#"><i class="fas fa-home"></i> Home</a>
                <a href="#"><i class="fas fa-bullhorn"></i> Notizie</a>
                
                <div class="dropdown">
                    <a href="#"><i class="fas fa-search"></i> Chi Siamo <i class="fas fa-chevron-down" style="font-size: 0.7rem; margin-left: -2px;"></i></a>
                    <div class="dropdown-menu">
                        <a href="capo-polizia.html"><i class="fas fa-user-tie"></i> Il Capo della Polizia</a>
                        <a href="#"><i class="fas fa-book"></i> Storia della Polizia</a>
                    </div>
                </div>

                <a href="qualifiche.html"><i class="fas fa-medal"></i> Qualifiche</a>
                <a href="#"><i class="fas fa-calendar-check"></i> Prenota</a>
                <a href="concorso.html"><i class="fas fa-trophy"></i> Concorso Pubblico</a>
            </div>

            <div class="nav-right">
                <button class="nav-login-btn" onclick="window.location.reload();">
                    Login
                    <div class="icon-circle">
                        <i class="fas fa-lock"></i>
                    </div>
                </button>
            </div>
        </nav>
    </div>

    <div class="hero-bg"></div>

    <div class="login-page-wrapper">
        <div class="glass-panel" id="main-panel">
            
            <div class="panel-header">
                <img src="https://i.imgur.com/gRzOXM3.png" alt="Logo IPRP" class="logo">
                <h1>SISTEMA OPERATIVO</h1>
                <p>Identificazione Richiesta</p>
            </div>

            <div id="department-selector">
                <button class="dept-btn" onclick="mostraForm('Squadra Mobile', 'https://i.imgur.com/J3T1Kot.png')">
                    <div class="dept-icon-box"><img src="https://i.imgur.com/J3T1Kot.png" class="dept-img" alt="SM"></div>
                    <div class="dept-info"><h3>Squadra Mobile</h3><span>Sezione Investigativa</span></div>
                </button>

                <button class="dept-btn" onclick="mostraForm('DIGOS', 'https://i.imgur.com/rgGjsgX.png')">
                    <div class="dept-icon-box"><img src="https://i.imgur.com/rgGjsgX.png" class="dept-img" alt="DIGOS"></div>
                    <div class="dept-info"><h3>D.I.G.O.S.</h3><span>Divisione Generale</span></div>
                </button>

                <button class="dept-btn" onclick="mostraForm('NOS', 'https://i.imgur.com/gy3HsSH.png')">
                    <div class="dept-icon-box"><img src="https://i.imgur.com/gy3HsSH.png" class="dept-img" alt="NOS"></div>
                    <div class="dept-info"><h3>N.O.S.</h3><span>Nucleo Sicurezza</span></div>
                </button>
            </div>

            <div id="login-section" class="hidden">
                <div class="active-dept-header">
                    <div class="glow-icon"><img id="active-dept-icon" src="" alt="Reparto"></div>
                    <h2 id="login-title">Accesso</h2>
                </div>

                <form id="login-form">
                    <div class="input-group">
                        <label for="matricola">Matricola Operatore</label>
                        <div class="input-wrapper">
                            <i class="fas fa-id-badge"></i>
                            <input type="text" id="matricola" placeholder="Es. SM-001" required autocomplete="off">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="password">Codice di Sicurezza</label>
                        <div class="input-wrapper">
                            <i class="fas fa-key"></i>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button type="button" class="btn-back" onclick="nascondiForm()">
                            <i class="fas fa-arrow-left"></i> Indietro
                        </button>
                        <button type="submit" class="btn-submit" id="btn-login">
                            Autorizza <i class="fas fa-sign-in-alt"></i>
                        </button>
                    </div>
                    <div id="messaggio-errore"></div>
                </form>
            </div>

        </div>
    </div>

    <script>
        const selectorSection = document.getElementById('department-selector');
        const loginSection = document.getElementById('login-section');
        const loginTitle = document.getElementById('login-title');
        const activeDeptIcon = document.getElementById('active-dept-icon');
        const erroreMsg = document.getElementById('messaggio-errore');

        function mostraForm(nomeReparto, imgUrl) {
            selectorSection.classList.add('hidden');
            loginTitle.textContent = nomeReparto;
            activeDeptIcon.src = imgUrl;
            loginSection.classList.remove('hidden');
            erroreMsg.innerText = "";
        }

        function nascondiForm() {
            loginSection.classList.add('hidden');
            document.getElementById('login-form').reset();
            selectorSection.classList.remove('hidden');
            erroreMsg.innerText = "";
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPyEfr0KbWtYDeM5-EFTl3s3VGVB_8Yi8",
            authDomain: "database-dta.firebaseapp.com",
            projectId: "database-dta",
            storageBucket: "database-dta.firebasestorage.app",
            messagingSenderId: "229305773627",
            appId: "1:229305773627:web:ec3d17f5fcb3c65fdb761e",
            measurementId: "G-KDE0G5RPYC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            const matricola = document.getElementById('matricola').value;
            const password = document.getElementById('password').value;
            const repartoScelto = document.getElementById('login-title').textContent;
            
            const btnSubmit = document.getElementById('btn-login');
            const originaleText = btnSubmit.innerHTML;
            
            btnSubmit.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Verifica...';
            btnSubmit.disabled = true;
            erroreMsg.innerText = "";

            try {
                const q = query(collection(db, "agenti"), where("matricola", "==", matricola), where("password", "==", password));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const agente = querySnapshot.docs[0].data();
                    agente.reparto = repartoScelto;
                    localStorage.setItem('utenteLoggato', JSON.stringify(agente));
                    
                    window.location.href = 'squadra-mobile.html'; // Inserisci qui il link corretto alla dashboard
                } else {
                    erroreMsg.innerText = "Accesso Negato: Matricola o Password errate.";
                    btnSubmit.innerHTML = originaleText;
                    btnSubmit.disabled = false;
                }
            } catch (error) {
                console.error(error);
                erroreMsg.innerText = "Errore Server (Controlla le regole di Firebase).";
                btnSubmit.innerHTML = originaleText;
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
