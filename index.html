<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminale Operativo - IPRP Auth</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Colori ufficiali Google Material You Dark Theme */
            --bg-base: #131314;
            --surface: #1E1F22;
            --surface-variant: #2B2D31;
            --primary: #A8C7FA;
            --on-primary: #062E6F;
            --text-main: #E3E3E3;
            --text-muted: #C4C7C5;
            --error: #FFB4AB;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-base); color: var(--text-main); font-family: 'Roboto', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        h1, h2, h3, .btn-text { font-family: 'Outfit', sans-serif; }
        a { text-decoration: none; color: inherit; }
        .hidden { display: none !important; }

        /* Google Top Bar */
        .top-bar { height: 48px; background-color: var(--bg-base); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .top-bar-left { display: flex; align-items: center; gap: 10px; font-weight: 500; font-size: 0.9rem; color: var(--text-muted); }
        .top-bar-center { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--success); }
        .status-dot { width: 8px; height: 8px; background-color: #81C995; border-radius: 50%; box-shadow: 0 0 8px #81C995; animation: pulse 2s infinite; }
        .top-bar-right { font-family: monospace; color: var(--primary); font-weight: 500; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        /* Centro Google Account Style */
        .main-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .google-card { background: var(--surface); border-radius: 28px; width: 100%; max-width: 450px; padding: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; }
        .google-card .logo { width: 70px; margin-bottom: 20px; }
        .google-card h1 { font-size: 1.8rem; font-weight: 400; margin-bottom: 10px; color: var(--text-main); }
        .google-card p { color: var(--text-muted); margin-bottom: 30px; font-size: 0.95rem; line-height: 1.5; }

        /* Liste Reparti */
        .dept-list { display: flex; flex-direction: column; gap: 10px; }
        .dept-btn { background: var(--surface-variant); border: 1px solid transparent; border-radius: 16px; padding: 15px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; color: var(--text-main); transition: background 0.2s; text-align: left; }
        .dept-btn:hover { background: #373A40; }
        .dept-btn img { width: 35px; height: 35px; object-fit: contain; background: white; border-radius: 8px; padding: 4px; }
        .dept-btn .info h3 { font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 500; }
        .dept-btn .info span { font-size: 0.8rem; color: var(--text-muted); }
        .dept-btn i { margin-left: auto; color: var(--text-muted); }

        /* Form Login Material */
        .selected-dept { display: inline-flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 100px; font-size: 0.85rem; margin-bottom: 30px; cursor: pointer; transition: background 0.2s; }
        .selected-dept:hover { background: rgba(255,255,255,0.05); }
        .selected-dept i { font-size: 0.7rem; }
        
        .material-input { position: relative; margin-bottom: 20px; text-align: left; }
        .material-input input { width: 100%; background: var(--surface-variant); border: none; border-bottom: 2px solid var(--text-muted); border-radius: 8px 8px 0 0; padding: 24px 16px 8px 16px; color: var(--text-main); font-size: 1rem; outline: none; transition: border-bottom-color 0.2s; }
        .material-input input:focus { border-bottom-color: var(--primary); }
        .material-input label { position: absolute; left: 16px; top: 16px; color: var(--text-muted); font-size: 1rem; pointer-events: none; transition: 0.2s ease all; }
        .material-input input:focus + label, .material-input input:not(:placeholder-shown) + label { top: 6px; font-size: 0.75rem; color: var(--primary); }

        .actions { display: flex; justify-content: flex-end; margin-top: 30px; }
        .btn-primary { background: var(--primary); color: var(--on-primary); border: none; border-radius: 100px; padding: 12px 24px; font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; display: inline-flex; gap: 8px; align-items: center; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        #messaggio-errore { color: var(--error); font-size: 0.9rem; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="top-bar-left"><i class="fas fa-shield-alt"></i> IPRP Central Auth</div>
        <div class="top-bar-center"><div class="status-dot"></div> Rete Sicura</div>
        <div class="top-bar-right" id="live-clock">--:--:--</div>
    </div>

    <div class="main-wrapper">
        <div class="google-card" id="card-selector">
            <img src="https://i.imgur.com/gRzOXM3.png" class="logo" alt="Google">
            <h1>Accedi al Terminale</h1>
            <p>Seleziona il dipartimento per continuare con l'autenticazione di sicurezza.</p>
            
            <div class="dept-list">
                <button class="dept-btn" onclick="window.showLogin('Squadra Mobile')">
                    <img src="https://i.imgur.com/J3T1Kot.png">
                    <div class="info"><h3>Squadra Mobile</h3><span>Sezione Investigativa</span></div>
                    <i class="fas fa-chevron-right"></i>
                </button>
                <button class="dept-btn" onclick="window.showLogin('D.I.G.O.S.')">
                    <img src="https://i.imgur.com/rgGjsgX.png">
                    <div class="info"><h3>D.I.G.O.S.</h3><span>Divisione Generale</span></div>
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <div class="google-card hidden" id="card-login">
            <img src="https://i.imgur.com/gRzOXM3.png" class="logo" alt="Google" style="width: 50px; margin-bottom: 15px;">
            <h1>Verifica Identità</h1>
            
            <div class="selected-dept" onclick="window.showSelector()">
                <i class="fas fa-user-circle"></i> <span id="login-dept-name">Reparto</span> <i class="fas fa-caret-down"></i>
            </div>

            <form id="login-form">
                <div class="material-input">
                    <input type="text" id="badge" placeholder=" " required autocomplete="off">
                    <label>Matricola Operatore (Es. SM-001)</label>
                </div>
                <div class="material-input">
                    <input type="password" id="password" placeholder=" " required>
                    <label>Password di Rete</label>
                </div>

                <div class="actions">
                    <button type="submit" class="btn-primary" id="btn-submit">
                        <span class="btn-text">Avanti</span> <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
                <div id="messaggio-errore"></div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        setInterval(() => { document.getElementById('live-clock').textContent = new Date().toLocaleTimeString('it-IT', { hour12: false }); }, 1000);

        const firebaseConfig = { apiKey: "AIzaSyDPyEfr0KbWtYDeM5-EFTl3s3VGVB_8Yi8", authDomain: "database-dta.firebaseapp.com", projectId: "database-dta", storageBucket: "database-dta.firebasestorage.app", messagingSenderId: "229305773627", appId: "1:229305773627:web:ec3d17f5fcb3c65fdb761e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.showLogin = function(deptName) {
            document.getElementById('card-selector').classList.add('hidden');
            document.getElementById('login-dept-name').textContent = deptName;
            document.getElementById('card-login').classList.remove('hidden');
            document.getElementById('messaggio-errore').innerText = "";
        };

        window.showSelector = function() {
            document.getElementById('card-login').classList.add('hidden');
            document.getElementById('login-form').reset();
            document.getElementById('card-selector').classList.remove('hidden');
            document.getElementById('messaggio-errore').innerText = "";
        };

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const matricola = document.getElementById('badge').value;
            const password = document.getElementById('password').value;
            const btnSubmit = document.getElementById('btn-submit');
            const errBox = document.getElementById('messaggio-errore');

            btnSubmit.innerHTML = '<span class="btn-text">Verifica...</span> <i class="fas fa-circle-notch fa-spin"></i>';
            btnSubmit.disabled = true; errBox.innerText = "";

            try {
                const q = query(collection(db, "agenti"), where("matricola", "==", matricola), where("password", "==", password));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const sessionData = { matricola: matricola, reparto: document.getElementById('login-dept-name').textContent };
                    sessionStorage.setItem('sessioneAttiva', JSON.stringify(sessionData));
                    window.location.href = 'squadra-mobile.html';
                } else {
                    errBox.innerHTML = '<i class="fas fa-exclamation-circle"></i> Credenziali errate.';
                    btnSubmit.innerHTML = '<span class="btn-text">Avanti</span> <i class="fas fa-arrow-right"></i>'; 
                    btnSubmit.disabled = false;
                    document.getElementById('password').value = "";
                }
            } catch (error) {
                errBox.innerHTML = '<i class="fas fa-wifi"></i> Errore Server.';
                btnSubmit.innerHTML = '<span class="btn-text">Avanti</span> <i class="fas fa-arrow-right"></i>'; 
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
