<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTA - Sistema Operativo</title>
    <style>
        /* =========================================
           LA TUA GRAFICA ORIGINALE (SCREENSHOT)
           ========================================= */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a24; /* Sfondo scuro originale */
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- SCHERMATA LOGIN --- */
        #sezione-login {
            background-color: #121e36; /* Colore riquadro originale */
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 320px;
        }

        #sezione-login h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            letter-spacing: 2px;
            font-size: 22px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #8c9baf;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            background-color: #f0f2f5;
            color: #333;
            box-sizing: border-box;
            font-weight: bold;
        }

        #btn-login {
            width: 100%;
            padding: 14px;
            background-color: #103667; /* Blu scuro bottone originale */
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s;
            letter-spacing: 1px;
        }

        #btn-login:hover {
            background-color: #1a4b8c;
        }

        #messaggio-errore {
            color: #ff4d4d;
            margin-top: 15px;
            font-size: 13px;
            text-align: center;
            font-weight: bold;
            min-height: 18px;
        }

        /* --- SCHERMATA DASHBOARD (Nascosta all'inizio) --- */
        #sezione-dashboard {
            display: none; /* Appare solo dopo il login */
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #121e36;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            margin-bottom: 20px;
        }

        .dashboard-header h1 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 1px;
        }

        #btn-logout {
            background-color: #8c1a1a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #btn-logout:hover {
            background-color: #b32424;
        }

        .dashboard-card {
            background-color: #1e2a45;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border-left: 5px solid #103667;
        }

        .info-row {
            display: flex;
            margin-bottom: 15px;
            font-size: 16px;
            border-bottom: 1px solid #2a3b5c;
            padding-bottom: 10px;
        }

        .info-label {
            font-weight: bold;
            width: 150px;
            color: #8c9baf;
        }

        .info-value {
            font-weight: bold;
            color: #ffffff;
        }

        .status-ok {
            color: #4cd137;
        }
    </style>
</head>
<body>

    <div id="sezione-login">
        <h2>PORTALE D.T.A.</h2>
        
        <div class="input-group">
            <label for="matricola">Matricola Operativa</label>
            <input type="text" id="matricola" placeholder="Es. SM-001" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label for="password">Codice di Sicurezza</label>
            <input type="password" id="password" placeholder="Inserisci Password">
        </div>
        
        <button id="btn-login">AUTENTICAZIONE</button>
        <div id="messaggio-errore"></div>
    </div>


    <div id="sezione-dashboard">
        <div class="dashboard-header">
            <h1 id="saluto-header">Portale D.T.A.</h1>
            <button id="btn-logout">DISCONNETTI</button>
        </div>

        <div class="dashboard-card">
            <h2 style="margin-top: 0; color: #8c9baf;">Profilo Operativo</h2>
            
            <div class="info-row">
                <div class="info-label">Nome Agente:</div>
                <div class="info-value" id="nome-agente">---</div>
            </div>
            
            <div class="info-row">
                <div class="info-label">Grado:</div>
                <div class="info-value" id="grado-agente">---</div>
            </div>

            <div class="info-row">
                <div class="info-label">Matricola:</div>
                <div class="info-value" id="matricola-agente">---</div>
            </div>

            <div class="info-row">
                <div class="info-label">Stato Sistema:</div>
                <div class="info-value status-ok">ATTIVO E AUTORIZZATO</div>
            </div>
        </div>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        // Le tue chiavi esatte
        const firebaseConfig = {
            apiKey: "AIzaSyDPyEfr0KbWtYDeM5-EFTl3s3VGVB_8Yi8",
            authDomain: "database-dta.firebaseapp.com",
            projectId: "database-dta",
            storageBucket: "database-dta.firebasestorage.app",
            messagingSenderId: "229305773627",
            appId: "1:229305773627:web:ec3d17f5fcb3c65fdb761e",
            measurementId: "G-KDE0G5RPYC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Funzione di Login
        document.getElementById('btn-login').addEventListener('click', async () => {
            const matricola = document.getElementById('matricola').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            const erroreMsg = document.getElementById('messaggio-errore');

            if (!matricola || !password) {
                erroreMsg.innerText = "Inserisci Matricola e Password.";
                return;
            }

            erroreMsg.innerText = "";
            btn.innerText = "VERIFICA IN CORSO...";

            try {
                // Cerca in Firebase
                const q = query(collection(db, "agenti"), where("matricola", "==", matricola), where("password", "==", password));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const agente = querySnapshot.docs[0].data();
                    
                    // Riempie la dashboard con i dati del database
                    document.getElementById('saluto-header').innerText = `Benvenuto, ${agente.grado} ${agente.nome}`;
                    document.getElementById('nome-agente').innerText = agente.nome;
                    document.getElementById('grado-agente').innerText = agente.grado;
                    document.getElementById('matricola-agente').innerText = agente.matricola;
                    
                    // Nasconde il login, mostra la dashboard
                    document.getElementById('sezione-login').style.display = 'none';
                    document.getElementById('sezione-dashboard').style.display = 'block';
                    
                    // Pulisce i campi per sicurezza
                    document.getElementById('matricola').value = "";
                    document.getElementById('password').value = "";
                } else {
                    erroreMsg.innerText = "Accesso Negato: Credenziali errate.";
                }
            } catch (error) {
                console.error(error);
                erroreMsg.innerText = "Errore Server (Controlla le Regole Firebase)";
            }
            
            btn.innerText = "AUTENTICAZIONE";
        });

        // Funzione di Logout
        document.getElementById('btn-logout').addEventListener('click', () => {
            // Nasconde la dashboard, mostra il login
            document.getElementById('sezione-dashboard').style.display = 'none';
            document.getElementById('sezione-login').style.display = 'block';
            document.getElementById('messaggio-errore').innerText = "";
        });
    </script>

</body>
</html>
