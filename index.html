<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminale Accesso - IPRP</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #07090f;
            --bg-panel: #10141f;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #2563eb; 
            --accent-hover: #1d4ed8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Lexend', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        /* SFONDO LOGIN */
        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #1e293b 0%, var(--bg-dark) 60%); z-index: 1;
        }

        /* CONTENITORE CENTRALE */
        .login-page-wrapper {
            position: relative; z-index: 2; min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        .glass-panel {
            background: rgba(15, 17, 26, 0.85); backdrop-filter: blur(25px);
            border: 1px solid var(--border-color); border-radius: 24px;
            padding: 45px 40px; width: 100%; max-width: 440px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        .panel-header { text-align: center; margin-bottom: 35px; }
        .panel-header .logo { width: 75px; margin-bottom: 15px; filter: drop-shadow(0 0 15px rgba(37, 99, 235, 0.5)); }
        .panel-header h1 { font-size: 1.5rem; font-weight: 800; color: var(--text-main); margin-bottom: 5px; }
        .panel-header p { color: var(--accent-blue); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

        /* BOTTONI REPARTO */
        .dept-btn {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 18px 20px; width: 100%; margin-bottom: 16px;
            color: var(--text-main); cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; text-align: left;
        }
        .dept-btn:hover { background: rgba(37, 99, 235, 0.08); border-color: var(--accent-blue); transform: translateY(-4px); }
        
        .dept-icon-box {
            background: rgba(15, 23, 42, 0.5); width: 45px; height: 45px;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            margin-right: 18px; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dept-img { width: 30px; height: 30px; object-fit: contain; }
        .dept-info h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 2px; }
        .dept-info span { font-size: 0.8rem; color: var(--text-muted); }

        /* SEZIONE FORM LOGIN */
        .hidden { display: none !important; }
        .active-dept-header { text-align: center; margin-bottom: 30px; }
        .glow-icon {
            width: 65px; height: 65px; margin: 0 auto 15px auto;
            background: rgba(15, 23, 42, 0.6); border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center;
        }
        .glow-icon img { width: 45px; height: 45px; object-fit: contain; }
        .active-dept-header h2 { font-size: 1.3rem; font-weight: 700; color: var(--text-main); text-transform: uppercase; }

        .input-group { margin-bottom: 22px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 15px; color: var(--text-muted); font-size: 1rem; }
        .input-wrapper input {
            width: 100%; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--border-color);
            color: var(--text-main); padding: 14px 15px 14px 45px; border-radius: 12px; font-size: 1rem; transition: all 0.3s ease;
        }
        .input-wrapper input:focus { outline: none; border-color: var(--accent-blue); background: rgba(0, 0, 0, 0.7); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15); }

        .action-buttons { display: flex; gap: 15px; margin-top: 35px; }
        .action-buttons button {
            flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 600; font-size: 0.95rem;
            cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-back { background: rgba(255, 255, 255, 0.05); color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-back:hover { background: rgba(255, 255, 255, 0.1); }
        .btn-submit { background: var(--accent-blue); color: white; }
        .btn-submit:hover { background: var(--accent-hover); }
        
        #messaggio-errore { color: #ef4444; font-size: 0.85rem; text-align: center; margin-top: 15px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="login-page-wrapper">
        <div class="glass-panel" id="main-panel">
            
            <div class="panel-header">
                <img src="https://i.imgur.com/gRzOXM3.png" alt="Logo IPRP" class="logo">
                <h1>SISTEMA OPERATIVO</h1>
                <p>Identificazione Richiesta</p>
            </div>

            <div id="department-selector">
                <button class="dept-btn" onclick="mostraForm('Squadra Mobile', 'https://i.imgur.com/J3T1Kot.png')">
                    <div class="dept-icon-box"><img src="https://i.imgur.com/J3T1Kot.png" class="dept-img" alt="SM"></div>
                    <div class="dept-info"><h3>Squadra Mobile</h3><span>Sezione Investigativa</span></div>
                </button>

                <button class="dept-btn" onclick="mostraForm('DIGOS', 'https://i.imgur.com/rgGjsgX.png')">
                    <div class="dept-icon-box"><img src="https://i.imgur.com/rgGjsgX.png" class="dept-img" alt="DIGOS"></div>
                    <div class="dept-info"><h3>D.I.G.O.S.</h3><span>Divisione Generale</span></div>
                </button>

                <button class="dept-btn" onclick="mostraForm('NOS', 'https://i.imgur.com/gy3HsSH.png')">
                    <div class="dept-icon-box"><img src="https://i.imgur.com/gy3HsSH.png" class="dept-img" alt="NOS"></div>
                    <div class="dept-info"><h3>N.O.S.</h3><span>Nucleo Sicurezza</span></div>
                </button>
            </div>

            <div id="login-section" class="hidden">
                <div class="active-dept-header">
                    <div class="glow-icon"><img id="active-dept-icon" src="" alt="Reparto"></div>
                    <h2 id="login-title">Accesso</h2>
                </div>

                <form id="login-form">
                    <div class="input-group">
                        <label for="matricola">Matricola Operatore</label>
                        <div class="input-wrapper">
                            <i class="fas fa-id-badge"></i>
                            <input type="text" id="matricola" placeholder="Es. SM-001" required autocomplete="off">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="password">Codice di Sicurezza</label>
                        <div class="input-wrapper">
                            <i class="fas fa-key"></i>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button type="button" class="btn-back" onclick="nascondiForm()">
                            <i class="fas fa-arrow-left"></i> Indietro
                        </button>
                        <button type="submit" class="btn-submit" id="btn-login">
                            Autorizza <i class="fas fa-sign-in-alt"></i>
                        </button>
                    </div>
                    <div id="messaggio-errore"></div>
                </form>
            </div>

        </div>
    </div>

    <script>
        const selectorSection = document.getElementById('department-selector');
        const loginSection = document.getElementById('login-section');
        const loginTitle = document.getElementById('login-title');
        const activeDeptIcon = document.getElementById('active-dept-icon');
        const erroreMsg = document.getElementById('messaggio-errore');

        function mostraForm(nomeReparto, imgUrl) {
            selectorSection.classList.add('hidden');
            loginTitle.textContent = nomeReparto;
            activeDeptIcon.src = imgUrl;
            loginSection.classList.remove('hidden');
            erroreMsg.innerText = ""; // Pulisce errori precedenti
        }

        function nascondiForm() {
            loginSection.classList.add('hidden');
            document.getElementById('login-form').reset();
            selectorSection.classList.remove('hidden');
            erroreMsg.innerText = "";
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPyEfr0KbWtYDeM5-EFTl3s3VGVB_8Yi8",
            authDomain: "database-dta.firebaseapp.com",
            projectId: "database-dta",
            storageBucket: "database-dta.firebasestorage.app",
            messagingSenderId: "229305773627",
            appId: "1:229305773627:web:ec3d17f5fcb3c65fdb761e",
            measurementId: "G-KDE0G5RPYC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault(); // Evita il ricaricamento della pagina
            
            const matricola = document.getElementById('matricola').value;
            const password = document.getElementById('password').value;
            const repartoScelto = document.getElementById('login-title').textContent;
            
            const btnSubmit = document.getElementById('btn-login');
            const originaleText = btnSubmit.innerHTML;
            
            // UI Caricamento
            btnSubmit.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Verifica...';
            btnSubmit.disabled = true;
            erroreMsg.innerText = "";

            try {
                // Interroga Firebase
                const q = query(collection(db, "agenti"), where("matricola", "==", matricola), where("password", "==", password));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    // Prende i dati dell'agente trovato
                    const agente = querySnapshot.docs[0].data();
                    
                    // Salva in memoria anche il reparto scelto (utile per la dashboard)
                    agente.reparto = repartoScelto;
                    localStorage.setItem('utenteLoggato', JSON.stringify(agente));
                    
                    // Redirige alla dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    erroreMsg.innerText = "Accesso Negato: Matricola o Password errate.";
                    btnSubmit.innerHTML = originaleText;
                    btnSubmit.disabled = false;
                }
            } catch (error) {
                console.error(error);
                erroreMsg.innerText = "Errore Server (Controlla le regole di Firebase).";
                btnSubmit.innerHTML = originaleText;
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
