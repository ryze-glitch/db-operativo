<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminale Operativo - IPRP</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar-wrapper">
        <nav class="navbar">
            <div class="nav-left">
                <div class="nav-logo">
                    <img src="https://i.imgur.com/SUM8B5x.png" alt="Logo">
                    POLIZIA IPRP
                </div>
            </div>
            <div class="nav-center">
                <a href="index.html"><i class="fas fa-home"></i> Home</a>
                <a href="#"><i class="fas fa-bullhorn"></i> Notizie</a>
                <div class="dropdown">
                    <a href="#"><i class="fas fa-search"></i> Chi Siamo <i class="fas fa-chevron-down" style="font-size: 0.7rem;"></i></a>
                    <div class="dropdown-menu">
                        <a href="capo-polizia.html"><i class="fas fa-user-tie"></i> Il Capo della Polizia</a>
                    </div>
                </div>
                <a href="qualifiche.html"><i class="fas fa-medal"></i> Qualifiche</a>
                <a href="#"><i class="fas fa-calendar-check"></i> Prenota</a>
            </div>
            <div class="nav-right">
                <button class="nav-login-btn">
                    Login <div class="icon-circle"><i class="fas fa-lock"></i></div>
                </button>
            </div>
        </nav>
    </div>

    <div class="split-layout">
        
        <div class="split-left">
            <div class="left-content">
                <img src="https://i.imgur.com/gRzOXM3.png" alt="Logo IPRP" class="big-logo">
                <h1>SISTEMA OPERATIVO<br><span>CENTRALE</span></h1>
                <p>Accesso riservato al personale autorizzato della Polizia di Stato. Rete criptata con protocollo di sicurezza IPRP.</p>
            </div>
        </div>

        <div class="split-right">
            <div class="auth-container">
                
                <div id="department-selector">
                    <div class="auth-header">
                        <h2>Identificazione Richiesta</h2>
                        <p>Seleziona il tuo reparto di appartenenza</p>
                    </div>

                    <div class="cards-grid">
                        <button class="modern-card" onclick="showLogin('Squadra Mobile', 'https://i.imgur.com/J3T1Kot.png')">
                            <div class="card-img-wrapper">
                                <img src="https://i.imgur.com/J3T1Kot.png" alt="Squadra Mobile">
                            </div>
                            <div class="card-content">
                                <h3>Squadra Mobile</h3>
                                <span>Sezione Investigativa</span>
                            </div>
                            <div class="card-arrow"><i class="fas fa-arrow-right"></i></div>
                        </button>

                        <button class="modern-card" onclick="showLogin('DIGOS', 'https://i.imgur.com/rgGjsgX.png')">
                            <div class="card-img-wrapper">
                                <img src="https://i.imgur.com/rgGjsgX.png" alt="DIGOS">
                            </div>
                            <div class="card-content">
                                <h3>D.I.G.O.S.</h3>
                                <span>Divisione Generale</span>
                            </div>
                            <div class="card-arrow"><i class="fas fa-arrow-right"></i></div>
                        </button>

                        <button class="modern-card" onclick="showLogin('NOS', 'https://i.imgur.com/gy3HsSH.png')">
                            <div class="card-img-wrapper">
                                <img src="https://i.imgur.com/gy3HsSH.png" alt="NOS">
                            </div>
                            <div class="card-content">
                                <h3>N.O.S.</h3>
                                <span>Nucleo Sicurezza</span>
                            </div>
                            <div class="card-arrow"><i class="fas fa-arrow-right"></i></div>
                        </button>
                    </div>
                </div>

                <div id="login-section" class="hidden">
                    <div class="auth-header">
                        <button class="back-link" onclick="showSelector()"><i class="fas fa-arrow-left"></i> Cambia Reparto</button>
                        <div class="selected-dept-display">
                            <div class="card-img-wrapper large">
                                <img id="active-dept-icon" src="" alt="Reparto">
                            </div>
                            <h2 id="login-title">Accesso</h2>
                        </div>
                    </div>

                    <form id="login-form" class="modern-form">
                        <div class="input-block">
                            <label>Matricola Operatore</label>
                            <div class="input-container">
                                <i class="fas fa-id-badge"></i>
                                <input type="text" id="badge" placeholder="Es. 12345" required>
                            </div>
                        </div>

                        <div class="input-block">
                            <label>Codice di Sicurezza</label>
                            <div class="input-container">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="password" placeholder="••••••••" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="cyber-btn">
                            <span>Inizializza Connessione</span>
                            <i class="fas fa-fingerprint"></i>
                        </button>
                    </form>
                </div>

            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
