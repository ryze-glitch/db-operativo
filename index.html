<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminale di Sicurezza | Accesso Dipartimentale</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay"></div>
    <div class="terminal-container">
        <header class="police-header">
            <div class="logo-placeholder">Stemma Ufficiale</div>
            <h1>SISTEMA OPERATIVO CENTRALE</h1>
            <p>Selezionare il dipartimento di competenza per l'autenticazione</p>
        </header>

        <main id="department-selector" class="grid-container">
            <button class="dept-btn" onclick="showLogin('Squadra Mobile')">
                <span class="dept-title">Squadra Mobile</span>
                <span class="dept-subtitle">Accesso Operativo</span>
            </button>
            <button class="dept-btn" onclick="showLogin('DIGOS')">
                <span class="dept-title">DIGOS</span>
                <span class="dept-subtitle">Accesso Informazioni</span>
            </button>
            <button class="dept-btn" onclick="showLogin('NOS')">
                <span class="dept-title">NOS</span>
                <span class="dept-subtitle">Accesso Tattico</span>
            </button>
        </main>

        <section id="login-section" class="hidden">
            <h2 id="login-title">Accesso Reparto</h2>
            <form id="login-form">
                <div class="input-group">
                    <label for="badge">Numero di Matricola</label>
                    <input type="text" id="badge" placeholder="Es: 12345" required>
                </div>
                <div class="input-group">
                    <label for="password">Codice di Sicurezza</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="action-buttons">
                    <button type="button" class="back-btn" onclick="showSelector()">Indietro</button>
                    <button type="submit" class="submit-btn">Autorizza</button>
                </div>
            </form>
        </section>

        <footer class="system-footer">
            <p>Rete Operativa IPRP | Nodo di Rete: Pisa | Connessione Criptata</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
