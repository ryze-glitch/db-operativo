<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminale Operativo - IPRP</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #07090f;
            --bg-panel: #10141f;
            --nav-bg: rgba(20, 22, 28, 0.75);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #2563eb; 
            --accent-hover: #1d4ed8;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Lexend', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        a { text-decoration: none; color: inherit; }

        .navbar-wrapper { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 1400px; z-index: 1000; }
        .navbar { background: var(--nav-bg); backdrop-filter: blur(16px); border: 1px solid var(--border-color); border-radius: 999px; padding: 6px 8px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-left { justify-self: start; }
        .nav-logo { background: #1b1e24; padding: 6px 20px 6px 12px; border-radius: 999px; display: flex; align-items: center; gap: 12px; font-weight: 700; color: var(--text-main); }
        .nav-logo img { height: 36px; }
        .nav-center { justify-self: center; display: flex; gap: 28px; font-size: 0.95rem; font-weight: 500; color: var(--text-muted); }
        .nav-center a { display: flex; align-items: center; gap: 8px; transition: color 0.2s; }
        .nav-center a:hover { color: white; }
        .nav-right { justify-self: end; }
        .nav-login-btn { background-color: var(--accent-blue); color: white; padding: 6px 10px 6px 20px; border-radius: 999px; display: flex; align-items: center; gap: 10px; font-weight: 600; border: none; cursor: pointer; }

        .split-layout { display: flex; height: 100vh; width: 100%; }

        .split-left { flex: 1; position: relative; background-image: url('https://i.imgur.com/HYyxG9W.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .split-left::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(7, 9, 15, 0.9) 0%, rgba(37, 99, 235, 0.2) 100%); }
        .left-content { position: relative; z-index: 2; max-width: 500px; }
        .left-content .big-logo { width: 120px; margin-bottom: 30px; filter: drop-shadow(0 0 20px rgba(37, 99, 235, 0.6)); }
        .left-content h1 { font-size: 3.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 20px; letter-spacing: -1px; }
        .left-content h1 span { color: var(--accent-blue); }
        .left-content p { font-size: 1.1rem; color: #cbd5e1; line-height: 1.6; font-weight: 300; }

        .split-right { flex: 0 0 550px; background: var(--bg-panel); display: flex; align-items: center; justify-content: center; padding: 40px; box-shadow: -10px 0 30px rgba(0,0,0,0.5); z-index: 5; }
        .auth-container { width: 100%; max-width: 400px; margin-top: 50px; }
        .auth-header { margin-bottom: 40px; }
        .auth-header h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
        .auth-header p { color: var(--text-muted); font-size: 0.95rem; }

        .cards-grid { display: flex; flex-direction: column; gap: 15px; }
        .modern-card { background: #161b26; border: 1px solid var(--border-color); border-radius: 16px; padding: 15px 20px; display: flex; align-items: center; cursor: pointer; transition: all 0.3s ease; text-align: left; width: 100%; color: var(--text-main); }
        .modern-card:hover { background: #1e2433; border-color: var(--accent-blue); transform: translateX(5px); }
        .card-img-wrapper { background: #ffffff; min-width: 55px; height: 55px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 20px; padding: 8px; }
        .card-img-wrapper img { width: 100%; height: 100%; object-fit: contain; }
        .card-content h3 { font-size: 1.1rem; margin-bottom: 3px; }
        .card-content span { font-size: 0.85rem; color: var(--text-muted); }
        .card-arrow { margin-left: auto; color: var(--text-muted); font-size: 1.2rem; }
        .modern-card:hover .card-arrow { color: var(--accent-blue); }

        .hidden { display: none !important; }
        .back-link { background: none; border: none; color: var(--text-muted); font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 30px; transition: color 0.2s; }
        .back-link:hover { color: white; }
        .selected-dept-display { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .card-img-wrapper.large { min-width: 70px; height: 70px; padding: 10px; border-radius: 16px; border: 2px solid var(--accent-blue); }

        .input-block { margin-bottom: 25px; }
        .input-block label { display: block; margin-bottom: 10px; font-size: 0.85rem; color: #cbd5e1; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
        .input-container { position: relative; }
        .input-container i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .input-container input { width: 100%; background: #0a0d14; border: 1px solid var(--border-color); color: white; padding: 16px 16px 16px 45px; border-radius: 12px; font-size: 1rem; transition: all 0.3s; }
        .input-container input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15); }

        .cyber-btn { width: 100%; padding: 18px; background: var(--accent-blue); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s; margin-top: 10px; }
        .cyber-btn:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4); }
        #messaggio-errore { color: #ef4444; font-size: 0.85rem; text-align: center; margin-top: 15px; font-weight: 600; }

        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        #login-section, #department-selector { animation: slideInRight 0.4s ease-out forwards; }
        @media (max-width: 1024px) { .split-layout { flex-direction: column; overflow-y: auto; height: auto; min-height: 100vh; } .split-left { padding: 100px 20px 40px; min-height: 40vh; text-align: center; } .left-content { margin: 0 auto; } .split-right { flex: auto; width: 100%; padding: 40px 20px; } .nav-center { display: none; } }
    </style>
</head>
<body>

    <div class="navbar-wrapper">
        <nav class="navbar">
            <div class="nav-left">
                <div class="nav-logo">
                    <img src="https://i.imgur.com/SUM8B5x.png" alt="Logo">
                    POLIZIA IPRP
                </div>
            </div>
            <div class="nav-center">
                <a href="index.html"><i class="fas fa-home"></i> Home</a>
                <a href="#"><i class="fas fa-bullhorn"></i> Notizie</a>
                <a href="qualifiche.html"><i class="fas fa-medal"></i> Qualifiche</a>
            </div>
            <div class="nav-right">
                <button class="nav-login-btn">
                    Login <div class="icon-circle"><i class="fas fa-lock"></i></div>
                </button>
            </div>
        </nav>
    </div>

    <div class="split-layout">
        
        <div class="split-left">
            <div class="left-content">
                <img src="https://i.imgur.com/gRzOXM3.png" alt="Logo IPRP" class="big-logo">
                <h1>SISTEMA OPERATIVO<br><span>CENTRALE</span></h1>
                <p>Accesso riservato al personale autorizzato della Polizia di Stato. Rete criptata con protocollo di sicurezza IPRP.</p>
            </div>
        </div>

        <div class="split-right">
            <div class="auth-container">
                
                <div id="department-selector">
                    <div class="auth-header">
                        <h2>Identificazione Richiesta</h2>
                        <p>Seleziona il tuo reparto di appartenenza</p>
                    </div>

                    <div class="cards-grid">
                        <button class="modern-card" onclick="window.showLogin('Squadra Mobile', 'https://i.imgur.com/J3T1Kot.png')">
                            <div class="card-img-wrapper"><img src="https://i.imgur.com/J3T1Kot.png" alt="Squadra Mobile"></div>
                            <div class="card-content"><h3>Squadra Mobile</h3><span>Sezione Investigativa</span></div>
                            <div class="card-arrow"><i class="fas fa-arrow-right"></i></div>
                        </button>

                        <button class="modern-card" onclick="window.showLogin('DIGOS', 'https://i.imgur.com/rgGjsgX.png')">
                            <div class="card-img-wrapper"><img src="https://i.imgur.com/rgGjsgX.png" alt="DIGOS"></div>
                            <div class="card-content"><h3>D.I.G.O.S.</h3><span>Divisione Generale</span></div>
                            <div class="card-arrow"><i class="fas fa-arrow-right"></i></div>
                        </button>

                        <button class="modern-card" onclick="window.showLogin('NOS', 'https://i.imgur.com/gy3HsSH.png')">
                            <div class="card-img-wrapper"><img src="https://i.imgur.com/gy3HsSH.png" alt="NOS"></div>
                            <div class="card-content"><h3>N.O.S.</h3><span>Nucleo Sicurezza</span></div>
                            <div class="card-arrow"><i class="fas fa-arrow-right"></i></div>
                        </button>
                    </div>
                </div>

                <div id="login-section" class="hidden">
                    <div class="auth-header">
                        <button class="back-link" onclick="window.showSelector()"><i class="fas fa-arrow-left"></i> Cambia Reparto</button>
                        <div class="selected-dept-display">
                            <div class="card-img-wrapper large">
                                <img id="active-dept-icon" src="" alt="Reparto">
                            </div>
                            <h2 id="login-title">Accesso</h2>
                        </div>
                    </div>

                    <form id="login-form" class="modern-form">
                        <div class="input-block">
                            <label>Matricola Operatore</label>
                            <div class="input-container">
                                <i class="fas fa-id-badge"></i>
                                <input type="text" id="badge" placeholder="Es. SM-001" autocomplete="off" required>
                            </div>
                        </div>

                        <div class="input-block">
                            <label>Codice di Sicurezza</label>
                            <div class="input-container">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="password" placeholder="••••••••" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="cyber-btn">
                            <span>Inizializza Connessione</span>
                            <i class="fas fa-fingerprint"></i>
                        </button>
                        <div id="messaggio-errore"></div>
                    </form>
                </div>

            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPyEfr0KbWtYDeM5-EFTl3s3VGVB_8Yi8",
            authDomain: "database-dta.firebaseapp.com",
            projectId: "database-dta",
            storageBucket: "database-dta.firebasestorage.app",
            messagingSenderId: "229305773627",
            appId: "1:229305773627:web:ec3d17f5fcb3c65fdb761e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const loginForm = document.getElementById('login-form');
        const erroreMsg = document.getElementById('messaggio-errore');
        
        // Funzioni UI esposte alla finestra globale
        window.showLogin = function(departmentName, imageSrc) {
            document.getElementById('department-selector').classList.add('hidden');
            document.getElementById('login-title').textContent = departmentName;
            document.getElementById('active-dept-icon').src = imageSrc;
            document.getElementById('login-section').classList.remove('hidden');
            erroreMsg.innerText = "";
        };

        window.showSelector = function() {
            document.getElementById('login-section').classList.add('hidden');
            loginForm.reset();
            document.getElementById('department-selector').classList.remove('hidden');
            erroreMsg.innerText = "";
        };

        // Firebase Login
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const matricola = document.getElementById('badge').value;
            const password = document.getElementById('password').value;
            const repartoScelto = document.getElementById('login-title').textContent;
            const btnSubmit = document.querySelector('.cyber-btn');
            
            const originalContent = btnSubmit.innerHTML;
            btnSubmit.innerHTML = '<span>Verifica Credenziali...</span> <i class="fas fa-circle-notch fa-spin"></i>';
            btnSubmit.style.opacity = '0.8';
            btnSubmit.disabled = true;
            erroreMsg.innerText = "";

            try {
                const q = query(collection(db, "agenti"), where("matricola", "==", matricola), where("password", "==", password));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const agente = querySnapshot.docs[0].data();
                    agente.reparto = repartoScelto; // Salviamo il reparto scelto
                    localStorage.setItem('utenteLoggato', JSON.stringify(agente));
                    
                    window.location.href = 'squadra-mobile.html';
                } else {
                    erroreMsg.innerText = "Accesso Negato: Credenziali errate.";
                    btnSubmit.innerHTML = originalContent;
                    btnSubmit.style.opacity = '1';
                    btnSubmit.disabled = false;
                }
            } catch (error) {
                console.error(error);
                erroreMsg.innerText = "Errore Server. Controlla la connessione.";
                btnSubmit.innerHTML = originalContent;
                btnSubmit.style.opacity = '1';
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
