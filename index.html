<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTA - Accesso Sistema Operativo</title>
    <style>
        /* La tua grafica integrata */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #16213e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 350px;
            text-align: center;
            border-top: 5px solid #0f3460;
        }
        .login-container h2 { margin-top: 0; margin-bottom: 25px; letter-spacing: 2px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 5px; color: #a9a9a9; }
        .input-group input {
            width: 100%; padding: 10px; border: none; border-radius: 5px;
            background-color: #e9ecef; color: #333; box-sizing: border-box; font-weight: bold;
        }
        button {
            width: 100%; padding: 12px; background-color: #0f3460; color: white;
            border: none; border-radius: 5px; font-size: 16px; cursor: pointer;
            transition: background-color 0.3s; font-weight: bold; letter-spacing: 1px;
        }
        button:hover { background-color: #e94560; }
        #messaggio-errore { color: #e94560; margin-top: 15px; font-weight: bold; font-size: 14px; height: 20px; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>PORTALE D.T.A.</h2>
        
        <div class="input-group">
            <label for="matricola">Matricola Operativa</label>
            <input type="text" id="matricola" placeholder="Es. SM-001" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label for="password">Codice di Sicurezza</label>
            <input type="password" id="password" placeholder="Inserisci Password">
        </div>
        
        <button id="btn-login">AUTENTICAZIONE</button>
        <div id="messaggio-errore"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPyEfr0KbWtYDeM5-EFTl3s3VGVB_8Yi8",
            authDomain: "database-dta.firebaseapp.com",
            projectId: "database-dta",
            storageBucket: "database-dta.firebasestorage.app",
            messagingSenderId: "229305773627",
            appId: "1:229305773627:web:ec3d17f5fcb3c65fdb761e",
            measurementId: "G-KDE0G5RPYC"
        };

        // Inizializza
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Funzione Login
        async function validaLogin() {
            const matricolaInput = document.getElementById('matricola').value;
            const passwordInput = document.getElementById('password').value;
            const erroreMsg = document.getElementById('messaggio-errore');
            const btn = document.getElementById('btn-login');

            if (!matricolaInput || !passwordInput) {
                erroreMsg.innerText = "Inserire tutti i campi.";
                return;
            }

            erroreMsg.innerText = "";
            btn.innerText = "VERIFICA IN CORSO...";

            try {
                const q = query(collection(db, "agenti"), where("matricola", "==", matricolaInput), where("password", "==", passwordInput));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const datiAgente = querySnapshot.docs[0].data();
                    // Salva grado, nome e matricola nel browser
                    localStorage.setItem('utenteLoggato', JSON.stringify(datiAgente));
                    window.location.href = 'dashboard.html';
                } else {
                    erroreMsg.innerText = "Accesso Negato: Credenziali errate.";
                    btn.innerText = "AUTENTICAZIONE";
                }
            } catch (error) {
                console.error("Errore Database:", error);
                erroreMsg.innerText = "Errore di connessione al Server DTA.";
                btn.innerText = "AUTENTICAZIONE";
            }
        }

        document.getElementById('btn-login').addEventListener('click', validaLogin);
    </script>

</body>
</html>
