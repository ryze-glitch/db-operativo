<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminale Operativo - IPRP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #07090f; --bg-panel: #10141f; --text-main: #f8fafc; --text-muted: #94a3b8; --accent-blue: #2563eb; --border-color: rgba(255, 255, 255, 0.08); --topbar-height: 35px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Lexend', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        a { text-decoration: none; color: inherit; }
        .top-bar { position: fixed; top: 0; left: 0; width: 100%; height: var(--topbar-height); background-color: #05070a; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 25px; z-index: 1000; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.5px; }
        .top-bar-left { display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
        .top-bar-left img { height: 14px; border-radius: 2px; }
        .top-bar-center { display: flex; align-items: center; gap: 8px; color: #a1a1aa; text-transform: uppercase; }
        .status-dot { width: 8px; height: 8px; background-color: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; animation: pulse 2s infinite; }
        .top-bar-right { font-family: monospace; color: #3b82f6; font-size: 0.85rem; font-weight: 700; letter-spacing: 1px; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        .split-layout { display: flex; height: calc(100vh - var(--topbar-height)); width: 100%; margin-top: var(--topbar-height); }
        .split-left { flex: 1; position: relative; background-image: url('https://i.imgur.com/HYyxG9W.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .split-left::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(7, 9, 15, 0.9) 0%, rgba(37, 99, 235, 0.2) 100%); }
        .left-content { position: relative; z-index: 2; max-width: 500px; }
        .left-content .big-logo { width: 120px; margin-bottom: 30px; filter: drop-shadow(0 0 20px rgba(37, 99, 235, 0.6)); }
        .left-content h1 { font-size: 3.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 20px; letter-spacing: -1px; }
        .left-content h1 span { color: var(--accent-blue); }
        .left-content p { font-size: 1.1rem; color: #cbd5e1; line-height: 1.6; font-weight: 300; }
        .split-right { flex: 0 0 550px; background: var(--bg-panel); display: flex; align-items: center; justify-content: center; padding: 40px; box-shadow: -10px 0 30px rgba(0,0,0,0.5); z-index: 5; }
        .auth-container { width: 100%; max-width: 400px; margin-bottom: 40px; }
        .auth-header { margin-bottom: 40px; }
        .auth-header h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
        .auth-header p { color: var(--text-muted); font-size: 0.95rem; }
        .cards-grid { display: flex; flex-direction: column; gap: 15px; }
        .modern-card { background: #161b26; border: 1px solid var(--border-color); border-radius: 16px; padding: 15px 20px; display: flex; align-items: center; cursor: pointer; transition: all 0.3s ease; text-align: left; width: 100%; color: var(--text-main); }
        .modern-card:hover { background: #1e2433; border-color: var(--accent-blue); transform: translateX(5px); }
        .card-img-wrapper { background: #ffffff; min-width: 55px; height: 55px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 20px; padding: 8px; }
        .card-img-wrapper img { width: 100%; height: 100%; object-fit: contain; }
        .card-content h3 { font-size: 1.1rem; margin-bottom: 3px; }
        .card-content span { font-size: 0.85rem; color: var(--text-muted); }
        .card-arrow { margin-left: auto; color: var(--text-muted); font-size: 1.2rem; }
        .modern-card:hover .card-arrow { color: var(--accent-blue); }
        .hidden { display: none !important; }
        .back-link { background: none; border: none; color: var(--text-muted); font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 30px; transition: color 0.2s; }
        .back-link:hover { color: white; }
        .selected-dept-display { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .card-img-wrapper.large { min-width: 70px; height: 70px; padding: 10px; border-radius: 16px; border: 2px solid var(--accent-blue); }
        .input-block { margin-bottom: 20px; }
        .input-block label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #cbd5e1; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
        .input-container { position: relative; }
        .input-container i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .input-container input { width: 100%; background: #0a0d14; border: 1px solid var(--border-color); color: white; padding: 14px 16px 14px 45px; border-radius: 12px; font-size: 1rem; transition: all 0.3s; outline: none; }
        .input-container input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
        .checkbox-container { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; margin-top: 5px; }
        .checkbox-container input[type="checkbox"] { appearance: none; background-color: #0a0d14; margin: 0; width: 18px; height: 18px; border: 1px solid var(--border-color); border-radius: 4px; display: grid; place-content: center; cursor: pointer; }
        .checkbox-container input[type="checkbox"]::before { content: ""; width: 10px; height: 10px; transform: scale(0); transition: 120ms transform; background-color: white; clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%); }
        .checkbox-container input[type="checkbox"]:checked { background-color: var(--accent-blue); border-color: var(--accent-blue); }
        .checkbox-container input[type="checkbox"]:checked::before { transform: scale(1); }
        .checkbox-container label { color: var(--text-muted); font-size: 0.9rem; cursor: pointer; user-select: none; }
        .cyber-btn { width: 100%; padding: 16px; background: var(--accent-blue); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s; }
        .cyber-btn:hover { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4); }
        #messaggio-errore { color: #ef4444; font-size: 0.85rem; text-align: center; margin-top: 15px; font-weight: 600; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        #login-section, #department-selector { animation: slideInRight 0.4s ease-out forwards; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="top-bar-left"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/03/Flag_of_Italy.svg/320px-Flag_of_Italy.svg.png" alt="IT"><span>POLIZIA DTA - DB CENTRALE</span></div>
        <div class="top-bar-center"><div class="status-dot"></div><span>Connessione Criptata Auth</span></div>
        <div class="top-bar-right" id="live-clock">--:--:--</div>
    </div>

    <div class="split-layout">
        <div class="split-left">
            <div class="left-content">
                <img src="https://i.imgur.com/gRzOXM3.png" alt="Logo IPRP" class="big-logo">
                <h1>SISTEMA OPERATIVO<br><span>CENTRALE</span></h1>
                <p>Accesso riservato al personale autorizzato. Autenticazione a due fattori attiva (PIN richiesto).</p>
            </div>
        </div>

        <div class="split-right">
            <div class="auth-container">
                <div id="department-selector">
                    <div class="auth-header"><h2>Identificazione</h2><p>Seleziona il reparto di competenza</p></div>
                    <div class="cards-grid">
                        <button class="modern-card" onclick="window.showLogin('Squadra Mobile', 'https://i.imgur.com/J3T1Kot.png')">
                            <div class="card-img-wrapper"><img src="https://i.imgur.com/J3T1Kot.png"></div>
                            <div class="card-content"><h3>Squadra Mobile</h3><span>Sezione Investigativa</span></div>
                            <div class="card-arrow"><i class="fas fa-arrow-right"></i></div>
                        </button>
                        <button class="modern-card" onclick="window.showLogin('DIGOS', 'https://i.imgur.com/rgGjsgX.png')">
                            <div class="card-img-wrapper"><img src="https://i.imgur.com/rgGjsgX.png"></div>
                            <div class="card-content"><h3>D.I.G.O.S.</h3><span>Divisione Generale</span></div>
                            <div class="card-arrow"><i class="fas fa-arrow-right"></i></div>
                        </button>
                    </div>
                </div>

                <div id="login-section" class="hidden">
                    <div class="auth-header">
                        <button class="back-link" onclick="window.showSelector()"><i class="fas fa-arrow-left"></i> Cambia Reparto</button>
                        <div class="selected-dept-display">
                            <div class="card-img-wrapper large"><img id="active-dept-icon" src=""></div>
                            <h2 id="login-title">Accesso</h2>
                        </div>
                    </div>

                    <form id="login-form" class="modern-form">
                        <div class="input-block">
                            <label>Matricola Operatore</label>
                            <div class="input-container"><i class="fas fa-id-badge"></i><input type="text" id="badge" placeholder="Es. SM-001" autocomplete="off" required></div>
                        </div>

                        <div class="input-block">
                            <label>Codice Sicurezza (Password)</label>
                            <div class="input-container"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="••••••••" required></div>
                        </div>

                        <div class="input-block">
                            <label>PIN Autorizzazione (6 Cifre)</label>
                            <div class="input-container"><i class="fas fa-key"></i><input type="password" id="pin" placeholder="******" maxlength="6" pattern="\d{6}" required title="Inserisci esattamente 6 numeri"></div>
                        </div>

                        <div class="checkbox-container">
                            <input type="checkbox" id="ricorda-login">
                            <label for="ricorda-login">Ricorda la mia Matricola</label>
                        </div>
                        
                        <button type="submit" class="cyber-btn"><span>Inizializza Connessione</span><i class="fas fa-fingerprint"></i></button>
                        <div id="messaggio-errore"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        setInterval(() => { document.getElementById('live-clock').textContent = new Date().toLocaleTimeString('it-IT', { hour12: false }); }, 1000);

        const firebaseConfig = { apiKey: "AIzaSyDPyEfr0KbWtYDeM5-EFTl3s3VGVB_8Yi8", authDomain: "database-dta.firebaseapp.com", projectId: "database-dta", storageBucket: "database-dta.firebasestorage.app", messagingSenderId: "229305773627", appId: "1:229305773627:web:ec3d17f5fcb3c65fdb761e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.showLogin = function(deptName, imgSrc) {
            document.getElementById('department-selector').classList.add('hidden');
            document.getElementById('login-title').textContent = deptName;
            document.getElementById('active-dept-icon').src = imgSrc;
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('messaggio-errore').innerText = "";
            
            const matSaved = localStorage.getItem('savedMatricola');
            if(matSaved) { document.getElementById('badge').value = matSaved; document.getElementById('ricorda-login').checked = true; }
        };

        window.showSelector = function() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('login-form').reset();
            document.getElementById('department-selector').classList.remove('hidden');
            document.getElementById('messaggio-errore').innerText = "";
        };

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const matricola = document.getElementById('badge').value;
            const password = document.getElementById('password').value;
            const pin = document.getElementById('pin').value; // RECUPERO PIN
            const btnSubmit = document.querySelector('.cyber-btn');
            const errBox = document.getElementById('messaggio-errore');
            
            if(document.getElementById('ricorda-login').checked) localStorage.setItem('savedMatricola', matricola);
            else localStorage.removeItem('savedMatricola');

            const originalContent = btnSubmit.innerHTML;
            btnSubmit.innerHTML = '<span>Verifica 2FA...</span> <i class="fas fa-circle-notch fa-spin"></i>';
            btnSubmit.disabled = true; errBox.innerText = "";

            try {
                // QUERY COMPLETA CON PIN AGGIUNTO
                const q = query(collection(db, "agenti"), where("matricola", "==", matricola), where("password", "==", password), where("pin", "==", pin));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    // SICUREZZA: Salviamo SOLO la matricola nel SessionStorage (si cancella chiudendo la scheda)
                    const sessionData = { matricola: matricola, reparto: document.getElementById('login-title').textContent };
                    sessionStorage.setItem('sessioneAttiva', JSON.stringify(sessionData));
                    window.location.href = 'squadra-mobile.html';
                } else {
                    errBox.innerText = "Accesso Negato: Credenziali o PIN errati.";
                    btnSubmit.innerHTML = originalContent; btnSubmit.disabled = false;
                    document.getElementById('password').value = ""; document.getElementById('pin').value = "";
                }
            } catch (error) {
                console.error(error); errBox.innerText = "Errore Connessione DB.";
                btnSubmit.innerHTML = originalContent; btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
